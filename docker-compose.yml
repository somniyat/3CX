services:
  api:
    build:
      context: .
      dockerfile: 3cx-api/Dockerfile
    container_name: 3cx-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3002}:3002"
    env_file:
      - ./3cx-api/.env
    environment:
      - NODE_ENV=production
    volumes:
      - api-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: ./3cx-dashboard
      dockerfile: Dockerfile
    container_name: 3cx-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  api-data:
